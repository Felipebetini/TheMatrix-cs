<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Matrix — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #00ff00;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    canvas#rain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.07;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 1rem 1.5rem;
      gap: 0.8rem;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #004400;
      padding-bottom: 0.6rem;
    }
    #title {
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px #00ff00;
    }
    #clock {
      color: #007700;
      font-size: 0.85rem;
    }

    #status-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
    }

    .card {
      border: 1px solid #004400;
      padding: 0.6rem 0.8rem;
      background: rgba(0, 40, 0, 0.3);
    }
    .card-label {
      font-size: 0.65rem;
      color: #007700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .card-value {
      font-size: 1rem;
      color: #00ff00;
    }
    .card-value.dim { color: #004400; }
    .card-value.warn { color: #ffaa00; text-shadow: 0 0 8px #ffaa00; }
    .card-value.ok   { color: #00ff00; text-shadow: 0 0 6px #00ff00; }

    #tool-row {
      border: 1px solid #004400;
      padding: 0.6rem 0.8rem;
      background: rgba(0, 40, 0, 0.2);
    }
    #tool-label {
      font-size: 0.65rem;
      color: #007700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    #tool-display {
      font-size: 0.9rem;
      color: #00cc00;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #tool-display.active { color: #00ff00; text-shadow: 0 0 6px #00ff00; }

    #log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid #004400;
      background: rgba(0, 20, 0, 0.3);
    }
    #log-header {
      font-size: 0.65rem;
      color: #007700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-bottom: 1px solid #003300;
    }
    #log-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0.8rem;
      font-size: 0.78rem;
      line-height: 1.5;
    }
    #log-body::-webkit-scrollbar { width: 4px; }
    #log-body::-webkit-scrollbar-track { background: #000; }
    #log-body::-webkit-scrollbar-thumb { background: #004400; }

    .log-entry {
      display: flex;
      gap: 1rem;
      color: #007700;
      border-bottom: 1px solid #001500;
      padding: 0.15rem 0;
    }
    .log-entry:last-child { color: #00ff00; }
    .log-time { color: #004d00; white-space: nowrap; flex-shrink: 0; }
    .log-tool { color: #00aa00; flex-shrink: 0; min-width: 120px; }
    .log-target { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #footer {
      font-size: 0.65rem;
      color: #003300;
      text-align: center;
      padding-top: 0.3rem;
    }
  </style>
</head>
<body>

<canvas id="rain"></canvas>

<div id="app">
  <div id="header">
    <div id="title">THE MATRIX</div>
    <div id="clock">--:--:--</div>
  </div>

  <div id="status-row">
    <div class="card">
      <div class="card-label">Agent</div>
      <div class="card-value dim" id="val-agent">idle</div>
    </div>
    <div class="card">
      <div class="card-label">Project</div>
      <div class="card-value dim" id="val-project">—</div>
    </div>
    <div class="card">
      <div class="card-label">Model</div>
      <div class="card-value dim" id="val-model">—</div>
    </div>
    <div class="card">
      <div class="card-label">Gate E</div>
      <div class="card-value dim" id="val-gate">clear</div>
    </div>
  </div>

  <div id="tool-row">
    <div id="tool-label">Current Tool</div>
    <div id="tool-display">—</div>
  </div>

  <div id="log-section">
    <div id="log-header">Event Log</div>
    <div id="log-body" id="log"></div>
  </div>

  <div id="footer">Matrix dashboard · localhost:2025 · polling /tmp/matrix-state.json</div>
</div>

<script>
// ── Matrix rain ─────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
  let drops = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const cols = Math.floor(canvas.width / 14);
    drops = Array.from({ length: cols }, () => Math.random() * -100);
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff00';
    ctx.font = '12px monospace';
    drops.forEach((y, i) => {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, y * 14);
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 0.5;
    });
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 50);
})();

// ── Dashboard state ──────────────────────────────────────────────────────────
let lastEventCount = 0;
let lastToolAt = 0;

function fmt(iso) {
  return iso ? iso.substring(11, 19) : '--:--:--';
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().substring(0, 8);
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fetchText(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

function setVal(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'card-value ' + (cls || '');
}

async function poll() {
  const state = await fetchJSON('/tmp/matrix-state.json');

  if (state) {
    const isActive = state.status === 'active';

    setVal('val-agent',   state.agent   || 'idle',    isActive ? 'ok' : 'dim');
    setVal('val-project', state.project || '—',       isActive ? ''   : 'dim');
    setVal('val-model',   state.model   || '—',       isActive ? ''   : 'dim');
    setVal('val-gate',    state.gate_e_armed ? 'ARMED' : 'clear',
                          state.gate_e_armed ? 'warn' : 'ok');

    if (state.last_tool) {
      const isNew = state.last_tool.at > lastToolAt;
      lastToolAt = state.last_tool.at;
      const toolEl = document.getElementById('tool-display');
      toolEl.textContent = state.last_tool.name + (state.last_tool.target ? '  ·  ' + state.last_tool.target : '');
      toolEl.className = isNew ? 'active' : '';
    }
  }

  const eventsText = await fetchText('/tmp/matrix-events.jsonl');
  if (eventsText) {
    const lines = eventsText.trim().split('\n').filter(Boolean);
    if (lines.length !== lastEventCount) {
      lastEventCount = lines.length;
      const logEl = document.getElementById('log-body');
      logEl.innerHTML = '';
      lines.slice(-100).reverse().forEach(line => {
        try {
          const e = JSON.parse(line);
          const div = document.createElement('div');
          div.className = 'log-entry';
          div.innerHTML =
            `<span class="log-time">${fmt(e.iso)}</span>` +
            `<span class="log-tool">${e.tool || ''}</span>` +
            `<span class="log-target">${(e.target || '').replace(/</g,'&lt;')}</span>`;
          logEl.appendChild(div);
        } catch {}
      });
    }
  }
}

updateClock();
setInterval(updateClock, 1000);
setInterval(poll, 1000);
poll();
</script>
</body>
</html>
